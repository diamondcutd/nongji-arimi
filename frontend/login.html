<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>로그인 — 농지알리미</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green:        #10B981;
  --green-dark:   #059669;
  --green-bg:     #ECFDF5;
  --bg:           #FFFFFF;
  --text:         #111827;
  --sub:          #6B7280;
  --border:       #F3F4F6;
  --footer-color: #9CA3AF;
}

@media (prefers-color-scheme: dark) {
  :root {
    --green:        #34D399;
    --green-dark:   #10B981;
    --green-bg:     rgba(52,211,153,0.1);
    --bg:           #111827;
    --text:         #F9FAFB;
    --sub:          #9CA3AF;
    --border:       #374151;
    --footer-color: #4B5563;
  }
}

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 420px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

.header {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.header-logo {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.4px;
  color: var(--text);
  text-decoration: none;
}
.header-logo em { font-style: normal; color: var(--green); }

.wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 32px 48px;
}

.logo-mark {
  width: 56px;
  height: 56px;
  background: var(--green-bg);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 28px;
}

h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.6px;
  line-height: 1.3;
  margin-bottom: 10px;
}

.desc {
  font-size: 14px;
  color: var(--sub);
  line-height: 1.6;
  margin-bottom: 40px;
}

.kakao-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 15px;
  background: #FEE500;
  color: #191919;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  border: none;
  border-radius: 13px;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: -0.3px;
}
.kakao-btn:hover  { background: #F5DC00; }
.kakao-btn:active { transform: scale(0.98); }

.kakao-btn svg {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}

.notice {
  margin-top: 20px;
  font-size: 12px;
  color: var(--sub);
  text-align: center;
  line-height: 1.6;
}
.notice.error { color: #ef4444; }

.footer {
  padding: 24px;
  text-align: center;
  font-size: 12px;
  color: var(--footer-color);
}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="header-logo">농지<em>알리미</em></a>
</header>

<div class="wrap">
  <div class="logo-mark">🌾</div>

  <h1>농지 매물 알림,<br>이제 놓치지 마세요</h1>
  <p class="desc">카카오 계정으로 간편하게 시작하세요.<br>로그인과 동시에 회원가입이 완료됩니다.</p>

  <a class="kakao-btn" id="kakaoBtn" href="/auth/kakao/login">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path fill-rule="evenodd" clip-rule="evenodd"
        d="M12 3C6.477 3 2 6.477 2 10.8c0 2.784 1.734 5.228 4.356 6.65L5.2 21l4.56-2.74c.73.1 1.48.153 2.24.153 5.523 0 10-3.477 10-7.8C22 6.477 17.523 3 12 3z"
        fill="#191919"/>
    </svg>
    카카오로 시작하기
  </a>

  <p class="notice" id="notice">로그인 시 서비스 이용약관 및 개인정보 처리방침에 동의하게 됩니다.</p>
</div>

<footer class="footer">&copy; 2026 농지알리미</footer>

<script>
// 에러 파라미터 처리
var params = new URLSearchParams(location.search);
if (params.get('error')) {
  var notice = document.getElementById('notice');
  notice.className = 'notice error';
  notice.textContent = '로그인 중 문제가 발생했습니다. 다시 시도해주세요.';
}

// 개발환경(localhost)에서는 API URL 앞에 포트 붙이기
var API = (location.hostname === '127.0.0.1' || location.hostname === 'localhost')
  ? 'http://localhost:8000'
  : '';
document.getElementById('kakaoBtn').href = API + '/auth/kakao/login';
</script>
</body>
</html>
