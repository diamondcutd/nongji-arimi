<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>농지알리미 — 원하는 농지, 올라오면 바로 알림</title>
<meta name="description" content="지역과 조건만 설정하면 새 매물을 자동으로 알려드립니다.">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green:        #10B981;
  --green-dark:   #059669;
  --green-light:  #D1FAE5;
  --green-bg:     #ECFDF5;
  --bg:           #FFFFFF;
  --text:         #111827;
  --sub:          #6B7280;
  --light:        #9CA3AF;
  --border:       #F3F4F6;
  --card:         #F9FAFB;
  --cta-bg:       #111827;
}

@media (prefers-color-scheme: dark) {
  :root {
    --green:        #34D399;
    --green-dark:   #10B981;
    --green-light:  rgba(52,211,153,0.15);
    --green-bg:     rgba(52,211,153,0.1);
    --bg:           #111827;
    --text:         #F9FAFB;
    --sub:          #9CA3AF;
    --light:        #6B7280;
    --border:       #374151;
    --card:         #1F2937;
    --cta-bg:       #1F2937;
  }
}

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 480px;
  margin: 0 auto;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── 헤더 ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: var(--bg);
}
.header-logo {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
}
.header-logo em {
  font-style: normal;
  color: var(--green);
}
.header-btn {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--sub);
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 500;
  border-radius: 10px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.header-btn:hover {
  border-color: var(--green);
  color: var(--green);
}

/* ── 히어로 ── */
.hero {
  padding: 72px 24px 64px;
  text-align: center;
}
.badge {
  display: inline-block;
  background: var(--green-bg);
  color: var(--green-dark);
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.2px;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.badge.show { opacity: 1; }

.typing-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.8px;
  line-height: 1.4;
  margin-top: 24px;
  min-height: 80px;
  color: var(--text);
}
.typing-title em {
  font-style: normal;
  color: var(--green);
}
.cursor {
  display: inline-block;
  width: 2px;
  height: 28px;
  background: var(--green);
  vertical-align: text-bottom;
  margin-left: 1px;
  animation: blink 0.85s step-end infinite;
}
.cursor.hide { display: none; }
@keyframes blink { 50% { opacity: 0; } }

.hero-desc {
  font-size: 16px;
  color: var(--sub);
  line-height: 1.7;
  margin-top: 20px;
  letter-spacing: -0.2px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.hero-desc.show {
  opacity: 1;
  transform: translateY(0);
}

.kakao-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 17px;
  background: #FEE500;
  color: #191919;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: -0.3px;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.kakao-btn:active {
  transform: scale(0.98);
}
.hero .kakao-btn {
  margin-top: 32px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.hero .kakao-btn.show {
  opacity: 1;
  transform: translateY(0);
}

/* ── 구분선 ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 0 24px;
}

/* ── 기능 섹션 ── */
.features {
  padding: 56px 24px 48px;
}
.features-label {
  font-size: 13px;
  color: var(--green);
  font-weight: 700;
  letter-spacing: -0.2px;
  margin-bottom: 28px;
}
.step {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 20px 0;
}
.step + .step {
  border-top: 1px solid var(--border);
}
.step-num {
  width: 32px;
  height: 32px;
  min-width: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--green-bg);
  color: var(--green-dark);
  font-size: 14px;
  font-weight: 800;
  border-radius: 10px;
}
.step-text h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}
.step-text p {
  font-size: 14px;
  color: var(--sub);
  line-height: 1.5;
  letter-spacing: -0.1px;
}

/* ── 하단 CTA ── */
.cta {
  margin: 0 24px;
  padding: 48px 28px 44px;
  background: var(--cta-bg);
  border-radius: 20px;
  text-align: center;
}
.cta h2 {
  font-size: 24px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.7px;
  line-height: 1.35;
}
.cta p {
  font-size: 15px;
  color: #9CA3AF;
  margin-top: 10px;
  margin-bottom: 32px;
  letter-spacing: -0.2px;
}
.cta .kakao-btn {
  border-radius: 12px;
}

/* ── 푸터 ── */
.footer {
  padding: 32px 24px 40px;
  text-align: center;
  font-size: 12px;
  color: var(--light);
  letter-spacing: -0.1px;
}
</style>
</head>
<body>

<!-- 헤더 -->
<header class="header">
  <div class="header-logo">농지<em>알리미</em></div>
  <button class="header-btn" id="headerBtn" onclick="location.href='login.html'">카카오 시작</button>
</header>

<!-- 히어로 -->
<section class="hero">
  <span class="badge" id="badge">농지은행 자동 알림</span>

  <div class="typing-title" id="typingTitle">
    <span id="typingText"></span><span class="cursor" id="cursor"></span>
  </div>

  <p class="hero-desc" id="heroDesc">
    지역과 조건만 설정하면<br>새 매물을 자동으로 알려드립니다.
  </p>

  <button class="kakao-btn" id="heroBtn" onclick="location.href='login.html'">
    <svg viewBox="0 0 24 22" fill="none" width="20" height="20">
      <path d="M12 0C5.373 0 0 4.187 0 9.352c0 3.31 2.064 6.22 5.19 7.953L4.07 21.3a.45.45 0 0 0 .648.493l5.656-3.476c.526.058 1.063.087 1.626.087 6.627 0 12-4.187 12-9.352C24 4.187 18.627 0 12 0z" fill="#191919"/>
    </svg>
    카카오로 시작하기
  </button>
</section>

<div class="divider"></div>

<!-- 기능 단계 -->
<section class="features">
  <div class="features-label">이렇게 작동해요</div>

  <div class="step">
    <div class="step-num">1</div>
    <div class="step-text">
      <h3>조건 설정</h3>
      <p>원하는 지역, 면적, 거래유형을 선택하세요.</p>
    </div>
  </div>

  <div class="step">
    <div class="step-num">2</div>
    <div class="step-text">
      <h3>자동 탐색</h3>
      <p>농지은행에 새 매물이 올라오면 대신 확인합니다.</p>
    </div>
  </div>

  <div class="step">
    <div class="step-num">3</div>
    <div class="step-text">
      <h3>바로 알림</h3>
      <p>조건에 맞는 매물만 골라서 알려드립니다.</p>
    </div>
  </div>
</section>

<!-- 하단 CTA -->
<section class="cta">
  <h2>직접 찾지 말고<br>알림 받으세요</h2>
  <p>원하는 조건만 설정하면 됩니다.</p>
  <button class="kakao-btn" onclick="location.href='login.html'">
    <svg viewBox="0 0 24 22" fill="none" width="20" height="20">
      <path d="M12 0C5.373 0 0 4.187 0 9.352c0 3.31 2.064 6.22 5.19 7.953L4.07 21.3a.45.45 0 0 0 .648.493l5.656-3.476c.526.058 1.063.087 1.626.087 6.627 0 12-4.187 12-9.352C24 4.187 18.627 0 12 0z" fill="#191919"/>
    </svg>
    카카오로 시작하기
  </button>
</section>

<!-- 푸터 -->
<footer class="footer">
  &copy; 2026 농지알리미
</footer>

<script>
(function() {
  // 로그인 상태 동기화
  var token = localStorage.getItem('token');
  var headerBtn = document.getElementById('headerBtn');
  if (token) {
    headerBtn.textContent = '대시보드';
    headerBtn.onclick = function() { location.href = 'dashboard.html'; };
  }

  // 애니메이션 시퀀스
  var badge = document.getElementById('badge');
  var typingText = document.getElementById('typingText');
  var cursor = document.getElementById('cursor');
  var heroDesc = document.getElementById('heroDesc');
  var heroBtn = document.getElementById('heroBtn');

  var sequences = [
    { text: '원하는 농지,', tag: null },
    { text: '\n', tag: null },
    { text: '올라오면 ', tag: null },
    { text: '바로 알림', tag: 'em' }
  ];

  function sleep(ms) {
    return new Promise(function(resolve) { setTimeout(resolve, ms); });
  }

  function getDelay(char, prevChar) {
    if (prevChar === ',') return 270;
    if (char === ' ') return 55;
    return 65 + Math.random() * 35;
  }

  async function typeSequences() {
    var prevChar = '';
    for (var s = 0; s < sequences.length; s++) {
      var seq = sequences[s];
      if (seq.text === '\n') {
        typingText.innerHTML += '<br>';
        await sleep(55);
        continue;
      }
      var element;
      if (seq.tag === 'em') {
        element = document.createElement('em');
        typingText.appendChild(element);
      } else {
        element = null;
      }
      for (var i = 0; i < seq.text.length; i++) {
        var char = seq.text[i];
        await sleep(getDelay(char, prevChar));
        if (element) {
          element.textContent += char;
        } else {
          var lastChild = typingText.lastChild;
          if (lastChild && lastChild.nodeType === 3) {
            lastChild.textContent += char;
          } else {
            typingText.appendChild(document.createTextNode(char));
          }
        }
        prevChar = char;
      }
    }
  }

  async function runAnimation() {
    await sleep(300);
    badge.classList.add('show');
    await sleep(420);
    await typeSequences();
    cursor.classList.add('hide');
    await sleep(200);
    heroDesc.classList.add('show');
    await sleep(300);
    heroBtn.classList.add('show');
  }

  runAnimation();
})();
</script>
</body>
</html>
